name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller function_viz.spec --onefile --windowed

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-viz-windows
          path: dist/function_viz.exe